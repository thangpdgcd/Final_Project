<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo_Web_Phan_Coffeess.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Phan Coffee— Premium Vietnamese Coffee. Browse our curated collection of Robusta, Arabica, Blend and Specialty coffees." />
    <title>Phan Coffee</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Viaoda+Libre&display=swap"
      rel="stylesheet"
    />
    <script>
      (function() {
        try {
          var localTheme = localStorage.getItem('theme');
          var darkQuery = window.matchMedia('(prefers-color-scheme: dark)');
          if (localTheme === 'dark' || (!localTheme && darkQuery.matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
