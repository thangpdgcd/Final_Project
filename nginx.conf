server {
    listen 8080;
    server_name _;

    # Luôn gửi Header này trong mọi phản hồi
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    # Header bổ trợ nếu bạn dùng Google One Tap
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always; 

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Đảm bảo header xuất hiện ở cả route chính
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        # PHẢI lặp lại ở đây vì Nginx sẽ bỏ header ở server nếu location này có add_header riêng
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        try_files $uri =404;
    }
}